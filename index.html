<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz</title>

<style>
body { font-family: Arial; margin: 20px; }
.question { margin-bottom: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 10px; }
.option { display: block; margin: 5px 0; padding: 8px; border: 1px solid #aaa; cursor: pointer; border-radius: 5px; }
.option:hover { background-color: #f0f0f0; }
.correct { background-color: #c8f7c5; }
.wrong { background-color: #f7c5c5; }
#timer { font-size: 20px; font-weight: bold; }
</style>
</head>

<body>

<h2>Quiz</h2>
<div id="timer">Time Left: 15:00</div>
<br>

<div id="quiz"></div>

<br>
<button onclick="submitQuiz()">Submit</button>

<h3 id="result"></h3>

<script>

const questions = [

{q:`The Kolleru Bird Sanctuary, known for its extensive freshwater wetland ecosystem between the Godavari and Krishna delta regions, is located in which state whose capital is Amaravati?`, options:["Telangana (TS)","Andhra Pradesh (AP)","Odisha (OD)","Tamil Nadu (TN)"], answer:1},

{q:`Pulicat Lake Bird Sanctuary, a significant brackish water lagoon ecosystem, is shared between Andhra Pradesh (AP) and which neighboring state with capital Chennai?`, options:["Kerala (KL)","Karnataka (KA)","Tamil Nadu (TN)","Odisha (OD)"], answer:2},

{q:`Manjira Bird Sanctuary, associated with a tributary system, lies in Telangana (TS) and is linked to which river system?`, options:["Godavari","Krishna","Musi","Pennar"], answer:0},

{q:`Bordoibam-Bilmukh Bird Sanctuary is situated in a northeastern state whose administrative capital is Dispur. Identify the state.`, options:["Meghalaya (ML)","Assam (AS)","Arunachal Pradesh (AR)","Nagaland (NL)"], answer:1},

{q:`Kusheshwar Asthan Bird Sanctuary, a prominent wetland habitat in eastern India, lies in Bihar (BR) which is predominantly drained by which river system?`, options:["Brahmaputra","Ganga","Godavari","Narmada"], answer:1},

{q:`The Bareli Jheel Salim Ali Bird Sanctuary is located in a state whose capital city is Patna. Identify the state.`, options:["Jharkhand (JH)","Bihar (BR)","Uttar Pradesh (UP)","Chhattisgarh (CG)"], answer:1},

{q:`The Okhla Bird Sanctuary, situated near the Delhi–Uttar Pradesh border, lies along which major river forming an inter-state boundary?`, options:["Yamuna","Ganga","Chambal","Gomti"], answer:0},

{q:`Sandi Bird Sanctuary is located in Uttar Pradesh (UP), a state whose capital is which of the following?`, options:["Jaipur","Lucknow","Dehradun","Bhopal"], answer:1},

{q:`The Salim Ali Bird Sanctuary in Goa (GA) is uniquely situated on an island ecosystem in which river?`, options:["Zuari","Mandovi","Tapti","Narmada"], answer:1},

{q:`Nal Sarovar Bird Sanctuary in Gujarat (GJ), near Gandhinagar, is globally known for which migratory bird phenomenon?`, options:["Pelican breeding","Flamingo congregation","Crane nesting","Eagle migration"], answer:1},

{q:`Kutch Bustard Sanctuary, located in Gujarat (GJ), primarily focuses on conservation of which category of birds?`, options:["Wetland ducks","Bustards","Flamingos","Pelicans"], answer:1},

{q:`Sultanpur Bird Sanctuary, located in Haryana (HR), lies in a region primarily drained by which river flowing near Chandigarh?`, options:["Yamuna","Sutlej","Beas","Ravi"], answer:0},

{q:`Pong Dam Lake Bird Sanctuary is located in Himachal Pradesh (HP), whose capital city is:`, options:["Dehradun","Shimla","Srinagar","Gangtok"], answer:1},

{q:`Udhuwa Lake Bird Sanctuary in Jharkhand (JH) lies in a region drained by which combination of rivers?`, options:["Damodar–Ganga–Subarnarekha","Godavari–Krishna","Narmada–Tapti","Brahmaputra–Barak"], answer:0},

{q:`Ranganathittu Bird Sanctuary in Karnataka (KA), near Bengaluru, is situated on which major river system?`, options:["Tungabhadra","Cauvery","Krishna","Pennar"], answer:1},

{q:`Kokkare Bellur Community Reserve in Karnataka (KA) is especially known for the conservation of which bird species combination?`, options:["Flamingo & Crane","Painted Stork & Pelican","Eagle & Kite","Duck & Goose"], answer:1},

{q:`Gudavi Bird Sanctuary lies in Karnataka (KA), whose capital city is:`, options:["Chennai","Bengaluru","Hyderabad","Panaji"], answer:1},

{q:`Kumarakom Bird Sanctuary in Kerala (KL), located near Kottayam, lies along which river system?`, options:["Periyar","Pamba","Bharathapuzha","Chalakudy"], answer:1},

{q:`Thattekad Bird Sanctuary, also known as Salim Ali Bird Sanctuary of Kerala (KL), lies near which major urban region?`, options:["Kochi","Thiruvananthapuram","Kozhikode","Kannur"], answer:0},

{q:`Ghatigaon Bustard Sanctuary in Madhya Pradesh (MP), with capital Bhopal, is dedicated to conservation of which bird species?`, options:["Flamingo","Bustard","Pelican","Crane"], answer:1},

{q:`Karera Bustard Sanctuary lies in Madhya Pradesh (MP), a state drained by which major west-flowing river?`, options:["Brahmaputra","Narmada","Godavari","Mahanadi"], answer:1},

{q:`Karnala Bird Sanctuary is located in Maharashtra (MH), which is drained by which set of major rivers?`, options:["Krishna–Godavari–Tapi","Ganga–Yamuna","Brahmaputra–Barak","Narmada–Tapti"], answer:0},

{q:`Nandur Madhmeshwar Bird Sanctuary in Maharashtra (MH) is associated with which river basin?`, options:["Godavari","Krishna","Tapi","Chambal"], answer:0},

{q:`Lengteng Wildlife Sanctuary lies in Mizoram (MZ), whose capital city is:`, options:["Imphal","Aizawl","Shillong","Kohima"], answer:1},

{q:`Nalabana Bird Sanctuary forms a core part of which large brackish water lake ecosystem in Odisha (OD)?`, options:["Sambhar Lake","Chilika Lake","Pulicat Lake","Loktak Lake"], answer:1},

{q:`Keoladeo National Park (Bharatpur Bird Sanctuary) lies in Rajasthan (RJ), a state drained by which river?`, options:["Chambal","Luni","Sabarmati","Tapi"], answer:0},

{q:`Tal Chhapar Sanctuary in Rajasthan (RJ) is particularly known for which group of birds?`, options:["Bustards","Flamingos","Pelicans","Ducks"], answer:0},

{q:`Vedanthangal Bird Sanctuary lies in Tamil Nadu (TN), a state drained by which major river system?`, options:["Cauvery","Krishna","Godavari","Narmada"], answer:0},

{q:`Point Calimere Bird Sanctuary in Tamil Nadu (TN) lies along which coastal region(s)?`, options:["Arabian Sea","Bay of Bengal","Gulf of Mannar","Both B and C"], answer:3},

{q:`Kulik Bird Sanctuary (Chintamoni Kar Bird Sanctuary) lies in West Bengal (WB), which is drained by which river system?`, options:["Ganga–Damodar–Mahananda","Krishna–Godavari","Brahmaputra–Barak","Narmada–Tapti"], answer:0},

{q:`Which of the following state capital–bird sanctuary pairs is correctly matched?`, options:["Bengaluru – Nal Sarovar","Gandhinagar – Khijadiya","Chennai – Sultanpur","Jaipur – Kumarakom"], answer:1},

{q:`Identify the INCORRECT sanctuary–state combination from the following:`, options:["Sultanpur – Haryana","Attiveri – Karnataka","Nal Sarovar – Rajasthan","Kumarakom – Kerala"], answer:2},

{q:`The state hosting Attiveri Bird Sanctuary (Karnataka – KA) is drained by which river systems?`, options:["Cauvery","Tungabhadra","Pennar","All of the above"], answer:3},

{q:`The state with capital Lucknow (UP) hosts which of the following bird sanctuaries?`, options:["Nal Sarovar","Okhla","Sultanpur","Thattekad"], answer:1},

{q:`Which of the following state–river–sanctuary combinations is correctly matched?`, options:["Gujarat – Sabarmati – Nal Sarovar","Kerala – Godavari – Kumarakom","Karnataka – Yamuna – Ranganathittu","Bihar – Krishna – Kusheshwar"], answer:0},

{q:`Which of the following states is NOT associated with bustard conservation based on listed sanctuaries?`, options:["Gujarat","Rajasthan","Madhya Pradesh","Kerala"], answer:3},

{q:`Which bird sanctuary is located in a deltaic wetland ecosystem between major river deltas?`, options:["Kolleru","Tal Chhapar","Karera","Bandli"], answer:0},

{q:`Identify the correctly matched capital–river pair from the following:`, options:["Patna – Yamuna","Chennai – Cauvery","Gandhinagar – Brahmaputra","Mumbai – Ganga"], answer:1},

{q:`Which Union Territory (UT) has the Yamuna River flowing through its capital region?`, options:["Chandigarh","Delhi (NCT)","Puducherry","Ladakh"], answer:1},

{q:`Which of the following state–capital–river combinations is correctly matched?`, options:["Karnataka – Bengaluru – Cauvery","Kerala – Kochi – Pamba","Gujarat – Ahmedabad – Narmada","Odisha – Cuttack – Mahanadi"], answer:0},];

// =======================
// QUIZ LOGIC
// =======================

let score = 0;
let answered = new Array(questions.length).fill(false);

function loadQuiz() {
    const quizDiv = document.getElementById("quiz");

    questions.forEach((item, index) => {
        const qDiv = document.createElement("div");
        qDiv.classList.add("question");

        qDiv.innerHTML = `<b>Q${index+1}. ${item.q}</b>`;

        item.options.forEach((opt, i) => {
            const optBtn = document.createElement("div");
            optBtn.classList.add("option");
            optBtn.innerText = opt;

            optBtn.onclick = () => checkAnswer(index, i, optBtn, qDiv);

            qDiv.appendChild(optBtn);
        });

        quizDiv.appendChild(qDiv);
    });
}

function checkAnswer(qIndex, selected, element, qDiv) {

    if (answered[qIndex]) return; // 🔒 Restriction

    answered[qIndex] = true;

    const correct = questions[qIndex].answer;
    const options = qDiv.querySelectorAll(".option");

    if (selected === correct) {
        element.classList.add("correct");
        element.innerHTML += " ✔ Correct";
        score += 1;
    } else {
        element.classList.add("wrong");
        element.innerHTML += " ❌ Wrong";
        score -= 0.25;

        // show correct answer
        options[correct].classList.add("correct");
        options[correct].innerHTML += " ✔ Correct Answer";
    }

    // disable all options
    options.forEach(opt => opt.style.pointerEvents = "none");
}

let quizSubmitted = false;

function submitQuiz() {
    if (quizSubmitted) return;

    quizSubmitted = true;
    clearInterval(timer); // stop timer

    document.getElementById("result").innerText =
        "Final Score: " + score.toFixed(2);

    // disable all options
    document.querySelectorAll(".option").forEach(opt => {
        opt.style.pointerEvents = "none";
    });

}

// =======================
// TIMER (20 mins)
// =======================

let time = 1200; // 20 min

const timer = setInterval(() => {
    let min = Math.floor(time / 60);
    let sec = time % 60;

    document.getElementById("timer").innerText =
        `Time Left: ${min}:${sec < 10 ? '0'+sec : sec}`;

    time--;

    if (time <= 0) {
        clearInterval(timer);
        alert("Time's up! Auto submitting...");
        submitQuiz();
    }

}, 1000);

// =======================

loadQuiz();

</script>

</body>
</html>
